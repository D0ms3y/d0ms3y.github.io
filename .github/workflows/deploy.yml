name: Deploy personal homepage

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.11]

    steps:
    - uses: actions/checkout@v2
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v2
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - run: npm ci
    
    - run: npm run build
    
    - run: cp -r dist ../dist
    
    - name: Delete gh-pages repository
      run: git push -d origin gh-pages && git branch gh-pages && git checkout gh-pages
    
    - name: Copy dist back
      run: rm -rf * && cp -r ../dist/. .
      
    - name: Deploy latest version of page into branch gh-pages
      uses: actions/checkout@v2
      run: |
        git config --global user.name 'Github Action'
        git config --global user.email 'actions@github.com'
        git commit -am "deploy latest version"
        git push -u origin gh-pages
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
